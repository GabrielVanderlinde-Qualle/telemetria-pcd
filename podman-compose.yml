version: "3.8"

# =============================================================================
# Grafana - Sistema de Monitoramento de Estações Telemétricas
# Deploy com Podman Compose
#
# USO:
#   podman-compose up -d          → sobe em background
#   podman-compose logs -f        → acompanha logs
#   podman-compose down           → para e remove containers
#   podman-compose pull           → atualiza imagens
# =============================================================================

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-telemetria
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      # -------------------------
      # Configurações básicas
      # -------------------------
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-http://localhost:3000}
      - GF_SERVER_DOMAIN=${GF_SERVER_DOMAIN:-localhost}

      # -------------------------
      # Segurança
      # -------------------------
      - GF_SECURITY_SECRET_KEY=${GF_SECURITY_SECRET_KEY}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_USERS_ALLOW_SIGN_UP=false

      # -------------------------
      # Autenticação Microsoft (Azure AD / OAuth2)
      # -------------------------
      - GF_AUTH_AZUREAD_ENABLED=${GF_AUTH_AZUREAD_ENABLED:-true}
      - GF_AUTH_AZUREAD_NAME=Microsoft
      - GF_AUTH_AZUREAD_ALLOW_SIGN_UP=true
      - GF_AUTH_AZUREAD_CLIENT_ID=${AZURE_CLIENT_ID}
      - GF_AUTH_AZUREAD_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - GF_AUTH_AZUREAD_SCOPES=openid email profile
      - GF_AUTH_AZUREAD_AUTH_URL=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize
      - GF_AUTH_AZUREAD_TOKEN_URL=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
      - GF_AUTH_AZUREAD_ALLOWED_DOMAINS=${AZURE_ALLOWED_DOMAINS}
      - GF_AUTH_AZUREAD_ALLOWED_GROUPS=${AZURE_ALLOWED_GROUPS:-}
      - GF_AUTH_AZUREAD_ROLE_ATTRIBUTE_STRICT=false

      # Redireciona login direto para Microsoft (desabilita tela de login padrão)
      - GF_AUTH_DISABLE_LOGIN_FORM=${GF_AUTH_DISABLE_LOGIN_FORM:-false}
      - GF_AUTH_AZUREAD_AUTO_LOGIN=${GF_AUTH_AZUREAD_AUTO_LOGIN:-false}

      # -------------------------
      # Plugin Zabbix
      # -------------------------
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=alexanderzobnin-zabbix-datasource

      # -------------------------
      # Banco de dados (SQLite por padrão, bom para início)
      # -------------------------
      - GF_DATABASE_TYPE=sqlite3
      - GF_DATABASE_PATH=/var/lib/grafana/grafana.db

      # -------------------------
      # Timezone e internacionalização
      # -------------------------
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=America/Sao_Paulo

    volumes:
      # Persistência dos dados (dashboards salvos, usuários, configs)
      - grafana-data:/var/lib/grafana

      # Provisionamento automático (datasource + dashboard ao iniciar)
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

      # Config customizada (opcional)
      # - ./grafana/config/grafana.ini:/etc/grafana/grafana.ini:ro

    networks:
      - telemetria-net

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  grafana-data:
    driver: local

networks:
  telemetria-net:
    driver: bridge
